name: Release Extension

on:
  release:
    types: [published]

jobs:
  package-extension:
    name: Package browser extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create extension zip
        run: cd extension && zip -r ../browser-feedback-extension-${{ github.event.release.tag_name }}.zip .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} browser-feedback-extension-${{ github.event.release.tag_name }}.zip
